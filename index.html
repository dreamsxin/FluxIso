<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LuxIso Demo</title>
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

      body {
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Segoe UI', system-ui, sans-serif;
        color: #aaa;
        gap: 16px;
        padding: 24px 12px;
      }

      h1 {
        font-size: 1rem;
        font-weight: 400;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #444;
      }

      /* ── Canvas wrapper + HUD ─────────────────────────────────────── */
      .canvas-wrap {
        position: relative;
        line-height: 0;
      }

      canvas {
        display: block;
        border-radius: 4px;
        box-shadow: 0 0 60px rgba(100,160,255,0.07);
        max-width: 100vw;
        cursor: crosshair;
      }

      .hud {
        position: absolute;
        top: 10px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        pointer-events: none;
        text-align: right;
      }

      .hud-section {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .hud-divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.06);
        margin: 6px 0;
      }

      .hud span {
        display: block;
        font-size: 0.67rem;
        line-height: 1.6;
        font-family: 'Consolas', 'Menlo', monospace;
        color: rgba(255,255,255,0.25);
        letter-spacing: 0.04em;
        white-space: nowrap;
      }

      .hud span.hud-prop {
        color: rgba(255,255,255,0.18);
        font-size: 0.63rem;
        line-height: 1.6;
      }

      /* ── Controls panel ───────────────────────────────────────────── */
      .panel {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px 24px;
        background: #0f0f18;
        border: 1px solid #1e1e2a;
        border-radius: 10px;
        padding: 16px 20px;
        width: 100%;
        max-width: 600px;
      }

      .panel-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .section-title {
        font-size: 0.65rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #333;
        padding-bottom: 4px;
        border-bottom: 1px solid #1a1a24;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .row.disabled {
        opacity: 0.3;
        pointer-events: none;
      }

      .row label {
        font-size: 0.72rem;
        color: #4a4a5e;
        width: 76px;
        flex-shrink: 0;
      }

      .row input[type="range"] {
        flex: 1;
        accent-color: #5590cc;
        cursor: pointer;
      }

      .row input[type="range"].gold { accent-color: #f0c040; }

      .row .val {
        font-size: 0.68rem;
        font-family: monospace;
        color: #3a3a4e;
        width: 28px;
        text-align: right;
        flex-shrink: 0;
      }

      /* Color picker */
      input[type="color"] {
        width: 28px;
        height: 22px;
        border: 1px solid #333;
        border-radius: 4px;
        background: none;
        cursor: pointer;
        padding: 1px;
        flex-shrink: 0;
      }

      /* Mode button */
      .mode-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 2px;
      }

      button#mode-btn {
        background: #16161f;
        border: 1px solid #2a2a3a;
        color: #666;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        padding: 5px 14px;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        user-select: none;
        white-space: nowrap;
      }

      button#mode-btn:hover { border-color: #444; color: #999; }

      button#mode-btn.active {
        background: #1c1808;
        border-color: #8a6010;
        color: #f0c040;
      }

      button#rainbow-btn {
        background: #16161f;
        border: 1px solid #2a2a3a;
        color: #666;
        font-size: 1rem;
        padding: 3px 10px;
        border-radius: 20px;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        user-select: none;
      }
      button#rainbow-btn:hover { border-color: #444; }
      button#rainbow-btn.active {
        background: #0a0a1a;
        border-color: #8040c0;
      }

      /* Keyboard shortcuts legend */
      .keys {
        font-size: 0.65rem;
        color: #282838;
        letter-spacing: 0.03em;
        line-height: 1.7;
        padding-top: 4px;
        border-top: 1px solid #1a1a24;
      }

      .keys kbd {
        display: inline-block;
        background: #16161f;
        border: 1px solid #2a2a38;
        border-radius: 3px;
        padding: 0 4px;
        font-size: 0.62rem;
        color: #3a3a50;
        font-family: monospace;
      }

      .cam-preset {
        background: #16161f;
        border: 1px solid #2a2a3a;
        color: #666;
        font-size: 0.68rem;
        letter-spacing: 0.06em;
        padding: 4px 10px;
        border-radius: 16px;
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s, color 0.12s;
        user-select: none;
      }
      .cam-preset:hover { border-color: #5a3a8a; color: #999; }
      .cam-preset.active {
        background: #1a0a2a;
        border-color: #8040c0;
        color: #c080ff;
      }
    </style>
  </head>
  <body>
    <h1>LuxIso &mdash; Isometric Engine Demo</h1>

    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="hud">
        <div class="hud-section">
          <span id="hud-ball">player  x:5.0 y:5.0 z:48</span>
          <span id="hud-path">path    idle</span>
          <span id="hud-light">light   x:8.2 y:5.0 z:120</span>
        </div>
      </div>
    </div>

    <div class="panel">

      <!-- Ball section -->
      <div class="panel-section">
        <div class="section-title">Ball</div>

        <div class="row">
          <label>Elevation</label>
          <input id="ball-elev" type="range" min="0" max="160" value="48" step="1" />
          <span class="val" id="ball-elev-val">48</span>
        </div>

        <div class="keys">
          <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> move &nbsp;|&nbsp;
          click floor to move &nbsp;|&nbsp; <kbd>R</kbd> reset
        </div>
      </div>

      <!-- Light section -->
      <div class="panel-section">
        <div class="section-title">Light</div>

        <div class="row">
          <label>Elevation</label>
          <input id="light-elev" type="range" min="20" max="300" value="120" step="1" class="gold" />
          <span class="val" id="light-elev-val">120</span>
        </div>

        <div class="row">
          <label>Intensity</label>
          <input id="light-intensity" type="range" min="0.1" max="3" value="1" step="0.05" class="gold" />
          <span class="val" id="light-intensity-val">1.0</span>
        </div>

        <div class="row">
          <label>Color</label>
          <input id="light-color" type="color" value="#ffd080" />
        </div>

        <div class="row" id="row-speed">
          <label>Orbit speed</label>
          <input id="light-speed" type="range" min="0.1" max="3" value="0.6" step="0.05" class="gold" />
          <span class="val" id="light-speed-val">0.6</span>
        </div>

        <div class="mode-row">
          <button id="mode-btn">Orbit</button>
          <button id="rainbow-btn" title="Rainbow mode (C)">🌈</button>
          <span style="font-size:0.68rem; color:#2a2a3a;">
            <kbd style="background:#16161f;border:1px solid #2a2a38;border-radius:3px;padding:0 4px;font-size:0.62rem;color:#3a3a50;font-family:monospace;">M</kbd>
            toggle &nbsp;|&nbsp; drag in manual
          </span>
        </div>
      </div>

      <!-- Minimap + Game section -->
      <div class="panel-section" style="grid-column: 1 / -1; border-top: 1px solid #1a1a24; padding-top: 10px;">
        <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div class="section-title">Camera View</div>
            <div class="row" style="margin-top:8px;">
              <label>Rotation</label>
              <input id="cam-rotation" type="range" min="0" max="360" value="0" step="1" style="accent-color:#a060ff;cursor:pointer;flex:1;" />
              <span class="val" id="cam-rotation-val" style="width:36px;">0°</span>
            </div>
            <div class="row">
              <label>Elevation</label>
              <input id="cam-elevation" type="range" min="0.2" max="1.0" value="0.5" step="0.01" style="accent-color:#a060ff;cursor:pointer;flex:1;" />
              <span class="val" id="cam-elevation-val" style="width:36px;">0.50</span>
            </div>
            <div class="mode-row" style="margin-top:4px;gap:6px;flex-wrap:wrap;">
              <button id="cam-ne" class="cam-preset active" data-rot="0"   data-elev="0.5">NE</button>
              <button id="cam-nw" class="cam-preset"        data-rot="90"  data-elev="0.5">NW</button>
              <button id="cam-sw" class="cam-preset"        data-rot="180" data-elev="0.5">SW</button>
              <button id="cam-se" class="cam-preset"        data-rot="270" data-elev="0.5">SE</button>
              <button id="cam-top" class="cam-preset"       data-rot="45"  data-elev="0.9">Top</button>
              <button id="cam-low" class="cam-preset"       data-rot="0"   data-elev="0.25">Low</button>
              <button id="cam-reset" style="margin-left:auto;background:#16161f;border:1px solid #2a2a3a;color:#666;font-size:0.68rem;padding:4px 10px;border-radius:16px;cursor:pointer;">Reset</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Minimap + Game section -->
      <div class="panel-section" style="grid-column: 1 / -1; border-top: 1px solid #1a1a24; padding-top: 10px;">
        <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap;">
          <div style="flex:1;min-width:200px;">
            <div class="section-title">Minimap</div>
            <div class="row" style="margin-top:8px;">
              <label>Show</label>
              <label style="display:flex;align-items:center;gap:8px;cursor:pointer;">
                <input id="minimap-toggle" type="checkbox" checked style="accent-color:#5590cc;cursor:pointer;width:14px;height:14px;" />
                <span style="font-size:0.7rem;color:#3a3a50;">Visible</span>
              </label>
              <label style="margin-left:auto;font-size:0.72rem;color:#4a4a5e;">Size</label>
              <input id="minimap-size" type="range" min="100" max="220" value="150" step="10" style="width:80px;accent-color:#5590cc;cursor:pointer;" />
              <label style="margin-left:12px;font-size:0.72rem;color:#4a4a5e;">Opacity</label>
              <input id="minimap-alpha" type="range" min="0.1" max="1" value="0.7" step="0.05" style="width:80px;accent-color:#5590cc;cursor:pointer;" />
            </div>
          </div>
          <div style="flex:0 0 auto;">
            <div class="section-title">Game</div>
            <div style="margin-top:8px;">
              <button id="reset-btn" style="background:#16161f;border:1px solid #2a2a3a;color:#888;font-size:0.72rem;letter-spacing:0.08em;padding:5px 14px;border-radius:20px;cursor:pointer;">↺ Reset  (R)</button>
            </div>
          </div>
        </div>
        <div class="keys" style="border:none;padding:0;margin-top:8px;">
          <kbd>Drag</kbd> minimap &nbsp;|&nbsp;
          <kbd>R</kbd> reset &nbsp;|&nbsp;
          <kbd>M</kbd> light mode &nbsp;|&nbsp;
          <kbd>C</kbd> rainbow &nbsp;|&nbsp;
          <kbd>↑↓←→</kbd> move
        </div>
      </div>

    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
