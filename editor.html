<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuxIso — Scene Editor</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a26; color: #c0c0d0;
      font-family: 'Segoe UI', system-ui, sans-serif; font-size: 13px;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 12px; background: #14141f;
      border-bottom: 1px solid #2a2a3e; flex-shrink: 0;
    }
    .topbar h1 { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: #5a5a7a; margin-right: 4px; }
    .topbar a { font-size: 0.70rem; color: #4a4a6a; text-decoration: none; padding: 3px 8px; border: 1px solid #2a2a3e; border-radius: 3px; }
    .topbar a:hover { color: #8899dd; border-color: #4455aa; }
    .topbar input[type="text"] {
      background: #1e1e2e; border: 1px solid #333348; color: #aaa;
      padding: 3px 8px; border-radius: 4px; font-size: 0.75rem; width: 140px;
    }
    .topbar input[type="text"]:focus { outline: none; border-color: #5566bb; color: #ddd; }
    .topbar .size-row { display: flex; align-items: center; gap: 4px; font-size: 0.68rem; color: #666; }
    .topbar .size-row input[type="number"] {
      width: 40px; background: #1e1e2e; border: 1px solid #2e2e44; color: #999;
      padding: 2px 4px; border-radius: 3px; font-size: 0.68rem; text-align: center;
    }
    .topbar .size-row input:focus { outline: none; border-color: #5566bb; color: #ddd; }
    .sep { width: 1px; height: 20px; background: #2a2a3e; margin: 0 4px; }
    .spacer { flex: 1; }
    .topbar button {
      background: #1e1e2e; border: 1px solid #333348; color: #888;
      padding: 3px 10px; border-radius: 4px; cursor: pointer; font-size: 0.72rem;
      transition: border-color 0.12s, color 0.12s;
    }
    .topbar button:hover:not(:disabled) { border-color: #5566aa; color: #bbc; }
    .topbar button:disabled { opacity: 0.3; cursor: default; }
    .topbar button.danger { border-color: #4a2222; color: #aa5555; }
    .topbar button.danger:hover { border-color: #883333; color: #dd7777; }

    /* ── Layout ── */
    .workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Left toolbar ── */
    .toolbar {
      width: 52px; background: #14141f; border-right: 1px solid #2a2a3e;
      display: flex; flex-direction: column; align-items: center;
      padding: 8px 0; gap: 3px; flex-shrink: 0; overflow-y: auto;
    }
    .tool-btn {
      width: 38px; height: 38px; background: #1e1e2e; border: 1px solid #2e2e44;
      border-radius: 5px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; font-size: 16px; color: #666;
      transition: border-color 0.12s, color 0.12s, background 0.12s; position: relative;
    }
    .tool-btn:hover { border-color: #4455aa; color: #aab; background: #22223a; }
    .tool-btn.active { border-color: #5566cc; color: #99aaee; background: #1e1e3a; }
    .tool-btn.active-red { border-color: #cc5555; color: #ee9999; background: #2e1a1a; }
    .tool-btn.active-green { border-color: #55bb66; color: #99eeaa; background: #1a2e1e; }
    .tool-btn[title]:hover::after {
      content: attr(title); position: absolute; left: 44px; top: 50%;
      transform: translateY(-50%); background: #22223a; border: 1px solid #3a3a5a;
      color: #ccc; padding: 3px 8px; border-radius: 4px; font-size: 0.70rem;
      white-space: nowrap; pointer-events: none; z-index: 100;
    }
    .tool-sep { width: 26px; height: 1px; background: #2a2a3e; margin: 2px 0; }

    /* ── Canvas area ── */
    .canvas-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: auto; background: #111118; padding: 16px;
    }
    #editor-canvas {
      display: block; cursor: crosshair; border-radius: 4px;
      box-shadow: 0 0 40px rgba(60,80,160,0.15); flex-shrink: 0;
    }

    /* ── Right panel ── */
    .right-panel {
      width: 230px; background: #14141f; border-left: 1px solid #2a2a3e;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }
    .panel-section { border-bottom: 1px solid #2a2a3e; padding: 8px 10px; }
    .panel-title { font-size: 0.62rem; letter-spacing: 0.14em; text-transform: uppercase; color: #4a4a6a; margin-bottom: 6px; }

    /* Object list */
    #object-list { flex: 0 0 auto; max-height: 140px; overflow-y: auto; }
    .obj-list-empty { font-size: 0.65rem; color: #4a4a6a; padding: 4px 0; }
    .obj-list-item {
      display: flex; align-items: center; gap: 6px; padding: 3px 4px;
      border-radius: 3px; cursor: pointer; font-size: 0.68rem;
    }
    .obj-list-item:hover { background: #1e1e2e; }
    .obj-list-item.active { background: #1e1e3a; color: #99aaee; }
    .obj-kind { font-size: 0.60rem; color: #5a5a7a; width: 52px; flex-shrink: 0; }
    .obj-name { color: #888; font-family: monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Properties */
    #prop-panel { flex: 1; overflow-y: auto; }
    #prop-panel.hidden { display: none; }
    .obj-id { font-size: 0.65rem; font-family: monospace; color: #5a5a7a; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid #2a2a3e; }
    .field-row { display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
    .field-row label { font-size: 0.65rem; color: #5a5a6a; width: 60px; flex-shrink: 0; }
    .field-row input {
      flex: 1; background: #1e1e2e; border: 1px solid #2e2e44; color: #aaa;
      padding: 2px 5px; border-radius: 3px; font-size: 0.70rem; min-width: 0;
    }
    .field-row input[type="color"] { padding: 1px 2px; height: 22px; cursor: pointer; }
    .field-row input:focus { outline: none; border-color: #5566bb; color: #ddd; }

    /* JSON */
    .json-section { display: flex; flex-direction: column; gap: 5px; padding: 8px 10px; border-top: 1px solid #2a2a3e; }
    .json-section textarea {
      background: #1a1a28; border: 1px solid #2a2a3e; color: #5a8a5a;
      font-family: 'Consolas', monospace; font-size: 0.60rem;
      padding: 5px; border-radius: 3px; resize: none; height: 100px;
    }
    .json-section textarea:focus { outline: none; border-color: #3a5a3a; }
    .json-btns { display: flex; gap: 5px; }
    .json-btns button {
      flex: 1; background: #1e1e2e; border: 1px solid #2e2e44; color: #777;
      padding: 3px 0; border-radius: 3px; cursor: pointer; font-size: 0.68rem;
    }
    .json-btns button:hover { border-color: #4455aa; color: #aab; }

    /* Status bar */
    .statusbar {
      padding: 3px 12px; background: #14141f; border-top: 1px solid #2a2a3e;
      font-size: 0.63rem; color: #5a5a7a; flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="topbar">
    <h1>Scene Editor</h1>
    <a href="/sprite-editor.html">Sprite Editor →</a>
    <a href="/">Demo</a>
    <div class="sep"></div>
    <input type="text" id="scene-name" placeholder="Scene name" />
    <div class="size-row">
      <span>Cols</span><input type="number" id="scene-cols" value="10" min="2" max="32" />
      <span>Rows</span><input type="number" id="scene-rows" value="10" min="2" max="32" />
    </div>
    <div class="spacer"></div>
    <button id="btn-undo" title="Undo (Ctrl+Z)" disabled>↩ Undo</button>
    <button id="btn-redo" title="Redo (Ctrl+Y)" disabled>↪ Redo</button>
    <div class="sep"></div>
    <button id="btn-delete" class="danger">Delete</button>
    <button id="btn-clear" class="danger">Clear</button>
  </div>

  <div class="workspace">

    <!-- Left toolbar -->
    <div class="toolbar">
      <button class="tool-btn" data-tool="select"    title="Select / Move (V)">↖</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="wall"      title="Wall (W)">▬</button>
      <button class="tool-btn" data-tool="omnilight" title="Omni Light (L)">✦</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="character" title="Character (C)">◉</button>
      <button class="tool-btn" data-tool="crystal"   title="Crystal (1)">◆</button>
      <button class="tool-btn" data-tool="boulder"   title="Boulder (2)">⬟</button>
      <button class="tool-btn" data-tool="chest"     title="Chest (3)">▣</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" data-tool="walkable"  title="Paint Walkable (P)" style="font-size:12px;color:#44aa55">✓</button>
      <button class="tool-btn" data-tool="blocked"   title="Paint Blocked (B)"  style="font-size:12px;color:#aa4444">✕</button>
    </div>

    <!-- Canvas -->
    <div class="canvas-area">
      <canvas id="editor-canvas"></canvas>
    </div>

    <!-- Right panel -->
    <div class="right-panel">

      <div class="panel-section">
        <div class="panel-title">Objects</div>
        <div id="object-list"></div>
      </div>

      <div class="panel-section" id="prop-panel">
        <div class="panel-title">Properties</div>
        <div id="prop-content"></div>
      </div>

      <div class="json-section">
        <div class="panel-title">Scene JSON</div>
        <textarea id="json-output" placeholder="Click Export…" spellcheck="false"></textarea>
        <div class="json-btns">
          <button id="btn-export">Export + Copy</button>
          <button id="btn-import">Import</button>
        </div>
      </div>

    </div>
  </div>

  <div class="statusbar" id="statusbar">
    Click a tool, then click the canvas to place objects.
  </div>

  <script type="module" src="/src/editor/editor.ts"></script>
</body>
</html>
