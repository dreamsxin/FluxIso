<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>LuxIso — 07 Desert Ruins</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a0e04;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #aaa;
      gap: 14px;
      padding: 20px 12px;
    }
    h1 { font-size: 0.85rem; font-weight: 400; letter-spacing: 0.2em; text-transform: uppercase; color: #5a3a1a; }
    canvas { display: block; border-radius: 4px; box-shadow: 0 0 80px rgba(200,140,40,0.15); cursor: default; }
    .panel {
      display: flex; gap: 20px; align-items: center; flex-wrap: wrap; justify-content: center;
      background: #100a04; border: 1px solid #2a1a08; border-radius: 8px;
      padding: 10px 18px; font-size: 0.72rem; color: #5a3a1a;
    }
    .row { display: flex; align-items: center; gap: 8px; }
    .row label { width: 90px; color: #5a3a1a; }
    input[type=range] { width: 110px; accent-color: #c08030; cursor: pointer; }
    .val { font-family: monospace; width: 36px; text-align: right; color: #4a2a0a; }
  </style>
</head>
<body>
  <h1>LuxIso — Desert Ruins</h1>
  <canvas id="canvas"></canvas>
  <div class="panel">
    <div class="row">
      <label>Dust speed</label>
      <input id="dust-speed" type="range" min="0.1" max="3" value="1" step="0.1" />
      <span class="val" id="dust-speed-val">1.0</span>
    </div>
    <div class="row">
      <label>Heat wave</label>
      <input id="heat-wave" type="range" min="0" max="5" value="2" step="0.1" />
      <span class="val" id="heat-wave-val">2.0</span>
    </div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
